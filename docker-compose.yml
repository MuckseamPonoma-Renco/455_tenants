services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: tenant_issue_os
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on: [db, redis]
    ports: ["8000:8000"]
    secrets: [gcp_sa_json]

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    depends_on: [db, redis]
    secrets: [gcp_sa_json]

secrets:
  gcp_sa_json:
    file: ./secrets/gcp_sa.json

volumes:
  pgdata:
