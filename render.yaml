services:
  - type: web
    name: tenant-issue-os-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: INGEST_TOKEN
        sync: false
      - key: MOBILE_FILER_TOKEN
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tenant-issue-os-redis
          property: connectionString
      - key: PROCESS_INLINE
        value: "0"
      - key: DISABLE_SHEETS_SYNC
        value: "0"
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp_sa.json
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_ESCALATE_MODEL
        value: gpt-5-mini
      - key: LLM_MODE
        value: "assist"
      - key: PUBLIC_BASE_URL
        sync: false

  - type: worker
    name: tenant-issue-os-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tenant-issue-os-redis
          property: connectionString
      - key: PROCESS_INLINE
        value: "0"
      - key: DISABLE_SHEETS_SYNC
        value: "0"
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp_sa.json
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_ESCALATE_MODEL
        value: gpt-5-mini
      - key: LLM_MODE
        value: "assist"

  - type: keyvalue
    name: tenant-issue-os-redis
    ipAllowList: []
